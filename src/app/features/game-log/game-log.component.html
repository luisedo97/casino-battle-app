<div class="log-header">
  <h2><i class="fa-solid fa-terminal"></i> Log</h2>
  <p-button label="Limpiar" size="small" severity="secondary" (onClick)="conn.clearLogs()" />
</div>

<div class="log-scroll" #logScroll>
  <div class="log-body">
    @for (entry of conn.logs(); track $index) {
      <div [class]="logClass(entry.type)">
        <span class="time">[{{ entry.time }}]</span> {{ entry.message }}
      </div>
    } @empty {
      <p class="muted">Sin eventos aún.</p>
    }
  </div>
</div>
